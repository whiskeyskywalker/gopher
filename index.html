<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Gopher">
  <meta name="theme-color" content="#0a0a0a">
  <title>Gopher Browser</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:        #0a0a0a;
      --surface:   #111111;
      --border:    #222222;
      --accent:    #00ff88;
      --accent2:   #00ccff;
      --text:      #e8e8e8;
      --muted:     #555555;
      --danger:    #ff4455;
      --dir-color: #00ccff;
      --txt-color: #e8e8e8;
      --search-color: #ffaa00;
      --img-color: #aa88ff;
      --info-color: #444444;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --font: 'IBM Plex Mono', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      overflow: hidden;
    }

    /* ── App Shell ── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      padding-top: var(--safe-top);
      padding-bottom: var(--safe-bottom);
    }

    /* ── Header ── */
    #header {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 8px 12px;
      flex-shrink: 0;
    }

    #toolbar {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
    }

    .icon-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font);
      font-size: 16px;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: border-color 0.15s, color 0.15s;
    }
    .icon-btn:active { background: var(--surface); }
    .icon-btn:disabled { opacity: 0.3; }
    .icon-btn.active { border-color: var(--accent); color: var(--accent); }

    #title-bar {
      flex: 1;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      padding: 0 4px;
    }

    /* ── Address Bar ── */
    #address-row {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    #address-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--accent);
      font-family: var(--font);
      font-size: 13px;
      padding: 8px 10px;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.15s;
    }
    #address-input:focus { border-color: var(--accent); }
    #address-input::placeholder { color: var(--muted); }

    #go-btn {
      background: var(--accent);
      color: #000;
      border: none;
      font-family: var(--font);
      font-size: 13px;
      font-weight: 600;
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      flex-shrink: 0;
    }
    #go-btn:active { opacity: 0.8; }

    /* ── Content ── */
    #content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }

    /* ── Loading ── */
    #loading {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 16px;
    }
    #loading.visible { display: flex; }

    .spinner {
      width: 32px;
      height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #loading p {
      font-size: 12px;
      color: var(--muted);
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }

    /* ── Menu ── */
    #menu-view { display: none; }
    #menu-view.visible { display: block; }

    .gopher-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      cursor: default;
      transition: background 0.1s;
    }
    .gopher-item.navigable { cursor: pointer; }
    .gopher-item.navigable:active { background: var(--surface); }

    .item-icon {
      font-size: 14px;
      flex-shrink: 0;
      margin-top: 1px;
      width: 18px;
      text-align: center;
    }

    .item-body { flex: 1; min-width: 0; }

    .item-text {
      font-size: 14px;
      line-height: 1.4;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .item-meta {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    .item-arrow {
      font-size: 12px;
      color: var(--muted);
      flex-shrink: 0;
      margin-top: 2px;
    }

    /* Item type colors */
    .type-dir  .item-text { color: var(--dir-color); }
    .type-text .item-text { color: var(--txt-color); }
    .type-search .item-text { color: var(--search-color); }
    .type-image .item-text { color: var(--img-color); }
    .type-info .item-text { color: var(--info-color); font-size: 12px; }
    .type-error .item-text { color: var(--danger); }
    .type-html .item-text { color: #44ff88; }

    /* ── Text View ── */
    #text-view {
      display: none;
      padding: 16px;
    }
    #text-view.visible { display: block; }

    #text-content {
      font-size: 13px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--text);
    }

    /* ── Error View ── */
    #error-view {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 12px;
      padding: 32px;
      text-align: center;
    }
    #error-view.visible { display: flex; }
    #error-icon { font-size: 48px; }
    #error-title { font-size: 16px; font-weight: 600; color: var(--danger); }
    #error-msg { font-size: 12px; color: var(--muted); line-height: 1.5; }
    #retry-btn {
      margin-top: 8px;
      background: none;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: var(--font);
      font-size: 13px;
      padding: 8px 20px;
      border-radius: 8px;
      cursor: pointer;
    }

    /* ── Bookmarks Sheet ── */
    #bm-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: flex-end;
    }
    #bm-overlay.visible { display: flex; }

    #bm-sheet {
      background: var(--surface);
      border-radius: 16px 16px 0 0;
      width: 100%;
      max-height: 70dvh;
      display: flex;
      flex-direction: column;
      padding-bottom: var(--safe-bottom);
    }

    #bm-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 16px 12px;
      border-bottom: 1px solid var(--border);
    }
    #bm-header h2 { font-size: 15px; font-weight: 600; }
    #bm-close {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 20px;
      cursor: pointer;
      font-family: var(--font);
    }

    #bm-list { overflow-y: auto; flex: 1; }

    .bm-item {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      gap: 10px;
      cursor: pointer;
    }
    .bm-item:active { background: var(--bg); }
    .bm-url {
      flex: 1;
      font-size: 13px;
      color: var(--accent2);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .bm-delete {
      background: none;
      border: none;
      color: var(--danger);
      font-size: 18px;
      cursor: pointer;
      padding: 4px;
      font-family: var(--font);
    }

    #bm-empty {
      padding: 40px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.8;
    }

    /* ── Search Dialog ── */
    #search-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    #search-overlay.visible { display: flex; }
    #search-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      width: 100%;
      max-width: 340px;
    }
    #search-box h3 { font-size: 14px; margin-bottom: 12px; color: var(--search-color); }
    #search-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      padding: 10px;
      border-radius: 8px;
      outline: none;
      margin-bottom: 12px;
    }
    #search-input:focus { border-color: var(--search-color); }
    .search-btns { display: flex; gap: 8px; justify-content: flex-end; }
    .search-btns button {
      font-family: var(--font);
      font-size: 13px;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
    }
    #search-cancel { background: none; border: 1px solid var(--border); color: var(--muted); }
    #search-go { background: var(--search-color); border: none; color: #000; font-weight: 600; }

    /* ── Proxy Notice ── */
    #proxy-notice {
      background: #1a1000;
      border-bottom: 1px solid #332200;
      padding: 8px 14px;
      font-size: 11px;
      color: #ffaa00;
      text-align: center;
      line-height: 1.4;
    }
    #proxy-notice a { color: #ffcc44; }
    #proxy-notice.hidden { display: none; }

    /* ── Font size controls (text view) ── */
    #text-controls {
      display: none;
      position: fixed;
      bottom: calc(16px + var(--safe-bottom));
      right: 16px;
      flex-direction: column;
      gap: 4px;
      z-index: 50;
    }
    #text-controls.visible { display: flex; }
    .size-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font);
      font-size: 16px;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Scan-line overlay (aesthetic) ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.03) 2px,
        rgba(0,0,0,0.03) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }
  </style>

<script>
// ─────────────────────────────────────────────
// CONFIG — set PROXY_URL to your deployed proxy
// ─────────────────────────────────────────────
const PROXY_URL = 'https://gopher-7oxz.onrender.com';

// ─── State ───────────────────────────────────
let history = [];
let current = { host: 'gopher.floodgap.com', port: 70, selector: '', title: 'Floodgap' };
let bookmarks = JSON.parse(localStorage.getItem('gopher_bookmarks') || '[]');
let fontSize = parseInt(localStorage.getItem('gopher_fontsize') || '13');
let pendingSearch = null;

// ─── DOM refs ────────────────────────────────
const $ = id => document.getElementById(id);
const addressInput = $('address-input');
const menuView     = $('menu-view');
const textView     = $('text-view');
const textContent  = $('text-content');
const errorView    = $('error-view');
const loading      = $('loading');
const backBtn      = $('back-btn');
const starBtn      = $('star-btn');
const proxyNotice  = $('proxy-notice');

// ─── Gopher Item Types ────────────────────────
const TYPES = {
  '0': { label: 'TXT', icon: '📄', color: 'type-text',   navigable: true  },
  '1': { label: 'DIR', icon: '📁', color: 'type-dir',    navigable: true  },
  '7': { label: 'SRC', icon: '🔍', color: 'type-search', navigable: true  },
  'h': { label: 'HTM', icon: '🌐', color: 'type-html',   navigable: true  },
  'i': { label: '',    icon: '',   color: 'type-info',   navigable: false },
  'g': { label: 'GIF', icon: '🖼', color: 'type-image',  navigable: false },
  'I': { label: 'IMG', icon: '🖼', color: 'type-image',  navigable: false },
  '9': { label: 'BIN', icon: '⬇', color: 'type-bin',    navigable: false },
  's': { label: 'SND', icon: '🎵', color: 'type-sound',  navigable: false },
  '3': { label: 'ERR', icon: '⚠', color: 'type-error',  navigable: false },
};
const typeInfo = t => TYPES[t] || { label: '???', icon: '❓', color: '', navigable: false };

// ─── URL helpers ─────────────────────────────
function parseURL(s) {
  s = s.trim();
  if (!s) return null;
  if (!s.startsWith('gopher://')) s = 'gopher://' + s;
  try {
    const u = new URL(s);
    const host = u.hostname;
    const port = parseInt(u.port) || 70;
    let sel = u.pathname;
    // strip item type byte if present
    if (sel.length >= 2 && '01234567ghIisT+'.includes(sel[1])) {
      sel = '/' + sel.slice(2);
    }
    return { host, port, selector: sel };
  } catch {
    // manual parse
    s = s.replace('gopher://', '');
    const slashIdx = s.indexOf('/');
    const hostPart = slashIdx === -1 ? s : s.slice(0, slashIdx);
    let sel = slashIdx === -1 ? '' : s.slice(slashIdx);
    const [host, portStr] = hostPart.split(':');
    return { host, port: parseInt(portStr) || 70, selector: sel };
  }
}

function currentURL() {
  return `gopher://${current.host}:${current.port}${current.selector || '/'}`;
}

// ─── Fetch via proxy ─────────────────────────
async function gopherFetch(host, port, selector) {
  if (!PROXY_URL) {
    // Demo mode: return fake menu
    return demoMenu(host, selector);
  }
  const params = new URLSearchParams({ host, port, selector });
  const resp = await fetch(`${PROXY_URL}/gopher?${params}`);
  if (!resp.ok) throw new Error(`Proxy error: ${resp.status}`);
  const json = await resp.json();
  return json; // { type: 'menu'|'text', content: ... }
}

// ─── Demo Mode ───────────────────────────────
function demoMenu(host, selector) {
  return {
    type: 'menu',
    items: [
      { type: 'i', text: `Welcome to ${host}`, selector: '', host: '', port: 70 },
      { type: 'i', text: '(Running in demo mode — set PROXY_URL to browse real servers)', selector: '', host: '', port: 70 },
      { type: 'i', text: '', selector: '', host: '', port: 70 },
      { type: '1', text: 'About Gopher', selector: '/about', host, port: 70 },
      { type: '0', text: 'Sample Text File', selector: '/sample.txt', host, port: 70 },
      { type: '7', text: 'Search Veronica-2', selector: '/v2/vs', host: 'gopher.floodgap.com', port: 70 },
      { type: 'i', text: '', selector: '', host: '', port: 70 },
      { type: 'i', text: '── Popular Gopher Servers ──', selector: '', host: '', port: 70 },
      { type: '1', text: 'Floodgap Systems', selector: '/', host: 'gopher.floodgap.com', port: 70 },
      { type: '1', text: 'Quux.org', selector: '/', host: 'gopher.quux.org', port: 70 },
      { type: '1', text: 'The Gopher Project', selector: '/', host: 'gopher.theoldnet.com', port: 70 },
    ]
  };
}

// ─── Navigation ──────────────────────────────
async function navigate(host, port, selector, title) {
  history.push({ ...current });
  current = { host, port, selector, title: title || `${host}${selector}` };
  await load();
}

async function goBack() {
  if (!history.length) return;
  current = history.pop();
  await load();
}

async function load() {
  showLoading();
  updateAddress();
  updateBackBtn();
  updateStar();

  try {
    const result = await gopherFetch(current.host, current.port, current.selector);
    if (result.type === 'menu') {
      renderMenu(result.items);
    } else if (result.type === 'text') {
      renderText(result.content);
    } else {
      showError('Unknown response type');
    }
  } catch (e) {
    showError(e.message || 'Failed to connect');
  }
}

// ─── Render Menu ─────────────────────────────
function renderMenu(items) {
  const html = items.map(item => {
    const info = typeInfo(item.type);
    const nav = info.navigable;
    const isInfo = item.type === 'i';

    if (isInfo && !item.text.trim()) {
      return `<div class="gopher-item type-info" style="padding:4px 14px;border:none;">
                <div class="item-text"> </div></div>`;
    }

    return `<div class="gopher-item ${info.color} ${nav ? 'navigable' : ''}"
                 data-type="${esc(item.type)}"
                 data-host="${esc(item.host)}"
                 data-port="${item.port}"
                 data-sel="${esc(item.selector)}"
                 data-text="${esc(item.text)}">
              ${isInfo ? '' : `<div class="item-icon">${info.icon}</div>`}
              <div class="item-body">
                <div class="item-text">${esc(item.text)}</div>
                ${(!isInfo && item.host) ? `<div class="item-meta">${esc(item.host)}:${item.port}</div>` : ''}
              </div>
              ${nav ? '<div class="item-arrow">›</div>' : ''}
            </div>`;
  }).join('');

  menuView.innerHTML = html;
  showView('menu');

  menuView.querySelectorAll('.navigable').forEach(el => {
    el.addEventListener('click', () => {
      const type = el.dataset.type;
      const host = el.dataset.host;
      const port = parseInt(el.dataset.port);
      const sel  = el.dataset.sel;
      const text = el.dataset.text;

      if (type === '7') {
        openSearch(host, port, sel, text);
      } else {
        navigate(host, port, sel, text);
      }
    });
  });
}

// ─── Render Text ─────────────────────────────
function renderText(text) {
  textContent.textContent = text;
  textContent.style.fontSize = fontSize + 'px';
  showView('text');
}

// ─── View Management ─────────────────────────
function showView(which) {
  loading.classList.remove('visible');
  menuView.classList.remove('visible');
  textView.classList.remove('visible');
  errorView.classList.remove('visible');
  $('text-controls').classList.remove('visible');

  if (which === 'menu')  menuView.classList.add('visible');
  if (which === 'text')  { textView.classList.add('visible'); $('text-controls').classList.add('visible'); }
  if (which === 'error') errorView.classList.add('visible');
  $('content').scrollTop = 0;
}

function showLoading() {
  loading.classList.add('visible');
  menuView.classList.remove('visible');
  textView.classList.remove('visible');
  errorView.classList.remove('visible');
  $('text-controls').classList.remove('visible');
}

function showError(msg) {
  $('error-msg').textContent = msg;
  showView('error');
}

// ─── UI Updates ──────────────────────────────
function updateAddress() {
  addressInput.value = currentURL();
}

function updateBackBtn() {
  backBtn.disabled = history.length === 0;
}

function updateStar() {
  const url = currentURL();
  starBtn.textContent = bookmarks.includes(url) ? '★' : '☆';
  starBtn.classList.toggle('active', bookmarks.includes(url));
}

function esc(s) {
  return String(s || '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// ─── Bookmarks ───────────────────────────────
function toggleBookmark() {
  const url = currentURL();
  const idx = bookmarks.indexOf(url);
  if (idx === -1) bookmarks.push(url);
  else bookmarks.splice(idx, 1);
  localStorage.setItem('gopher_bookmarks', JSON.stringify(bookmarks));
  updateStar();
}

function renderBookmarks() {
  const list = $('bm-list');
  if (!bookmarks.length) {
    list.innerHTML = `<div id="bm-empty">No bookmarks yet.<br>Tap ☆ while browsing to save a location.</div>`;
    return;
  }
  list.innerHTML = bookmarks.map((url, i) =>
    `<div class="bm-item">
       <div class="bm-url" data-url="${esc(url)}">${esc(url)}</div>
       <button class="bm-delete" data-idx="${i}">✕</button>
     </div>`
  ).join('');

  list.querySelectorAll('.bm-url').forEach(el => {
    el.addEventListener('click', () => {
      const parsed = parseURL(el.dataset.url);
      if (parsed) {
        closeBM();
        navigate(parsed.host, parsed.port, parsed.selector, el.dataset.url);
      }
    });
  });
  list.querySelectorAll('.bm-delete').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      bookmarks.splice(parseInt(el.dataset.idx), 1);
      localStorage.setItem('gopher_bookmarks', JSON.stringify(bookmarks));
      updateStar();
      renderBookmarks();
    });
  });
}

function openBM()  { renderBookmarks(); $('bm-overlay').classList.add('visible'); }
function closeBM() { $('bm-overlay').classList.remove('visible'); }

// ─── Search ──────────────────────────────────
function openSearch(host, port, selector, title) {
  pendingSearch = { host, port, selector, title };
  $('search-input').value = '';
  $('search-overlay').classList.add('visible');
  setTimeout(() => $('search-input').focus(), 100);
}

function doSearch() {
  const query = $('search-input').value.trim();
  if (!query || !pendingSearch) return;
  $('search-overlay').classList.remove('visible');
  const { host, port, selector, title } = pendingSearch;
  navigate(host, port, selector + '\t' + query, title + ': ' + query);
}

// ─── Proxy notice ────────────────────────────
if (PROXY_URL) proxyNotice.classList.add('hidden');

$('proxy-help-link').addEventListener('click', e => {
  e.preventDefault();
  alert(
    'To browse real Gopher servers, deploy the included proxy:\n\n' +
    '1. Upload proxy/server.js to a Node.js host\n' +
    '   (Render.com, Railway.app — both free tier)\n\n' +
    '2. Set PROXY_URL in index.html to your deployment URL\n\n' +
    '3. Reload this page'
  );
});

// ─── Event Listeners ─────────────────────────
backBtn.addEventListener('click', goBack);
$('reload-btn').addEventListener('click', load);
starBtn.addEventListener('click', toggleBookmark);
$('bm-btn').addEventListener('click', openBM);
$('bm-close').addEventListener('click', closeBM);
$('bm-overlay').addEventListener('click', e => { if (e.target === $('bm-overlay')) closeBM(); });

$('go-btn').addEventListener('click', () => {
  const parsed = parseURL(addressInput.value);
  if (parsed) navigate(parsed.host, parsed.port, parsed.selector, addressInput.value);
});

addressInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') $('go-btn').click();
});

$('retry-btn').addEventListener('click', load);

$('font-up').addEventListener('click', () => {
  fontSize = Math.min(24, fontSize + 1);
  textContent.style.fontSize = fontSize + 'px';
  localStorage.setItem('gopher_fontsize', fontSize);
});
$('font-dn').addEventListener('click', () => {
  fontSize = Math.max(9, fontSize - 1);
  textContent.style.fontSize = fontSize + 'px';
  localStorage.setItem('gopher_fontsize', fontSize);
});

$('search-cancel').addEventListener('click', () => $('search-overlay').classList.remove('visible'));
$('search-go').addEventListener('click', doSearch);
$('search-input').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

// ─── Boot ────────────────────────────────────
load();
</script>

</body>
</html>
